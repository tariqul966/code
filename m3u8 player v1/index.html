<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U8 Link Generator</title>
    <style>
        /* CSS for Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 6px;
            word-break: break-all;
            display: none; /* Initially hidden */
        }
        .result-box a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .copy-btn {
            background-color: #28a745;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>M3U8 Player Link Generator</h2>
    
    <label for="m3u8Input">Enter M3U8 URL:</label>
    <input type="text" id="m3u8Input" placeholder="https://example.com/video.m3u8">
    
    <button onclick="generateLink()">Generate Link</button>

    <div id="resultBox" class="result-box">
        <strong>Generated Link:</strong><br>
        <p id="finalLinkText"></p>
        <button class="copy-btn" onclick="copyToClipboard()">Copy Link</button>
    </div>
</div>

<script>
    // JavaScript Logic
    function generateLink() {
        const inputUrl = document.getElementById('m3u8Input').value.trim();
        const resultBox = document.getElementById('resultBox');
        const finalLinkText = document.getElementById('finalLinkText');

        if (inputUrl === "") {
            alert("Please enter a valid M3U8 URL first!");
            return;
        }

        // Base URL processing
        const baseUrl = "https://m3u8player.org/player.html?url=";
        const fullLink = baseUrl + encodeURIComponent(inputUrl);

        // Display the result
        finalLinkText.innerHTML = `<a href="${fullLink}" target="_blank">${fullLink}</a>`;
        resultBox.style.display = "block";
    }

    function copyToClipboard() {
        const link = document.querySelector('#finalLinkText a').href;
        navigator.clipboard.writeText(link).then(() => {
            alert("Link copied to clipboard!");
        });
    }
</script>

</body>
</html>
